# Canary — production-oriented stack. Use docker-compose.dev.yml for bind mounts + Vite hot reload.
#
# Profiles (set COMPOSE_PROFILES in `.env` or pass --profile):
#   prod — nginx static UI on FRONTEND_PORT_PUBLISH (default :8080)
#   dev  — Vite dev UI on FRONTEND_DEV_PORT_PUBLISH (default :5173)
#
# Examples:
#   cp .env.example .env   # edit secrets
#   docker compose --profile prod up -d
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml --profile dev up

networks:
  canary:

services:
  db:
    image: postgres:16.6
    container_name: canary-db
    networks: [canary]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-canary}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env — see .env.example}
      POSTGRES_DB: ${POSTGRES_DB:-canary}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT_PUBLISH:-5432:5432}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  backend:
    build: ./backend
    container_name: canary-backend
    networks: [canary]
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      db:
        condition: service_healthy
    command:
      [
        "sh",
        "-c",
        "alembic upgrade head && exec uvicorn app.main:app --host 0.0.0.0 --port 8000",
      ]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s
    environment:
      # Leave DATABASE_URL empty so docker-entrypoint.sh builds it with a URL-encoded password.
      # Set DATABASE_URL in `.env` only if you need a manual override (e.g. external Postgres).
      DATABASE_URL: ${DATABASE_URL:-}
      POSTGRES_USER: ${POSTGRES_USER:-canary}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env — see .env.example}
      POSTGRES_DB: ${POSTGRES_DB:-canary}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env — see .env.example}
      BOOTSTRAP_ADMIN_TOKEN: ${BOOTSTRAP_ADMIN_TOKEN:?Set BOOTSTRAP_ADMIN_TOKEN in .env — see .env.example}
      TOTP_ISSUER: ${TOTP_ISSUER:-Canary}
      FILES_ROOT: /data/files
      CANARY_PUBLIC_URL: ${CANARY_PUBLIC_URL:-http://localhost:8000}
      CANARY_CORS_ORIGINS: ${CANARY_CORS_ORIGINS:-}
      # Optional extra regex for browser Origin (e.g. https://app.example.com). See .env.example.
      CANARY_CORS_ORIGIN_REGEX: ${CANARY_CORS_ORIGIN_REGEX:-}
      # Trust X-Forwarded-Proto / client IP from these networks (Docker bridge + loopback). Set to * only if you understand the tradeoff.
      CANARY_BEHIND_REVERSE_PROXY: ${CANARY_BEHIND_REVERSE_PROXY:-1}
      CANARY_PROXY_TRUSTED_HOSTS: ${CANARY_PROXY_TRUSTED_HOSTS:-172.16.0.0/12,127.0.0.1,::1}
      WEBDAV_SESSION_HOURS: "8"
      ONLYOFFICE_JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:?Set ONLYOFFICE_JWT_SECRET in .env — see .env.example}
      ONLYOFFICE_DS_PUBLIC_URL: ${ONLYOFFICE_DS_PUBLIC_URL:-http://localhost:${ONLYOFFICE_HOST_PORT:-18080}}
      ONLYOFFICE_APP_URL_INTERNAL: ${ONLYOFFICE_APP_URL_INTERNAL:-}
      ONLYOFFICE_PREFER_IPV4_FOR_DS: ${ONLYOFFICE_PREFER_IPV4_FOR_DS:-}
      ONLYOFFICE_DOCUMENT_URL: ${ONLYOFFICE_DOCUMENT_URL:-}
      ONLYOFFICE_DS_INTERNAL_URL: http://onlyoffice
      RADICALE_HTPASSWD_PATH: /radicale-data/users
      CANARY_CALDAV_PUBLIC_URL: ${CANARY_CALDAV_PUBLIC_URL:-http://localhost:5232}
      RADICALE_INTERNAL_URL: ${RADICALE_INTERNAL_URL:-http://radicale:5232}
      # Microsoft Graph (optional — New > E-mail → Outlook draft; values from `.env`)
      CANARY_MS_GRAPH_TENANT_ID: ${CANARY_MS_GRAPH_TENANT_ID:-}
      CANARY_MS_GRAPH_CLIENT_ID: ${CANARY_MS_GRAPH_CLIENT_ID:-}
      CANARY_MS_GRAPH_CLIENT_SECRET: ${CANARY_MS_GRAPH_CLIENT_SECRET:-}
      CANARY_OUTLOOK_WEB_MAIL_BASE: ${CANARY_OUTLOOK_WEB_MAIL_BASE:-}
      CANARY_OUTLOOK_CATEGORY_NAME: ${CANARY_OUTLOOK_CATEGORY_NAME:-Canary}
    volumes:
      - ./data/files:/data/files
      - radicale-data:/radicale-data
    ports:
      - "${BACKEND_PORT_PUBLISH:-8000:8000}"

  radicale:
    image: tomsquest/docker-radicale:3.1.3.0
    container_name: canary-radicale
    networks: [canary]
    entrypoint:
      [
        "/bin/sh",
        "-c",
        'mkdir -p /data/collections && (test -f /data/users || touch /data/users) && exec docker-entrypoint.sh /usr/bin/radicale --config /config/config',
      ]
    volumes:
      - ./radicale/config:/config:ro
      - radicale-data:/data
    ports:
      - "${RADICALE_PORT_PUBLISH:-0.0.0.0:5232:5232}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:5232/ -o /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  onlyoffice:
    image: onlyoffice/documentserver:7.5
    container_name: canary-onlyoffice
    networks: [canary]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_started
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:?Set ONLYOFFICE_JWT_SECRET in .env — see .env.example}
      SECURE_LINK_SECRET: ${ONLYOFFICE_SECURE_LINK_SECRET:?Set ONLYOFFICE_SECURE_LINK_SECRET in .env — see .env.example}
      JWT_IN_BODY: "true"
      ALLOW_PRIVATE_IP_ADDRESS: "true"
      ALLOW_META_IP_ADDRESS: "true"
    #volumes:
    #  - ./onlyoffice-local-cachefix.json:/etc/onlyoffice/documentserver/local.json
    ports:
      - "${ONLYOFFICE_PORT_PUBLISH:-0.0.0.0:18080:80}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsSL -o /dev/null http://127.0.0.1/web-apps/apps/api/documents/api.js || curl -fsS -o /dev/null http://127.0.0.1/",
        ]
      interval: 20s
      timeout: 15s
      retries: 45
      start_period: 300s

  frontend:
    profiles: [prod]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_BASE: ${VITE_API_BASE:-}
        VITE_ONLYOFFICE_URL: ${VITE_ONLYOFFICE_URL:-/office-ds}
        VITE_ONLYOFFICE_DIRECT_PORT: ${VITE_ONLYOFFICE_DIRECT_PORT:-}
        VITE_ONLYOFFICE_DIRECT_URL: ${VITE_ONLYOFFICE_DIRECT_URL:-}
    container_name: canary-frontend
    networks: [canary]
    depends_on:
      backend:
        condition: service_healthy
      onlyoffice:
        condition: service_started
    ports:
      - "${FRONTEND_PORT_PUBLISH:-0.0.0.0:8080:80}"

  frontend_dev:
    profiles: [dev]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: canary-frontend-dev
    networks: [canary]
    depends_on:
      backend:
        condition: service_healthy
      onlyoffice:
        condition: service_started
    environment:
      VITE_ONLYOFFICE_URL: "/office-ds"
      VITE_ONLYOFFICE_DIRECT_PORT: ${VITE_ONLYOFFICE_DIRECT_PORT:-18080}
      VITE_DEV_PROXY_TARGET: http://backend:8000
      ONLYOFFICE_PROXY_TARGET: http://onlyoffice:80
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    ports:
      - "${FRONTEND_DEV_PORT_PUBLISH:-0.0.0.0:5173:5173}"

volumes:
  db-data:
  radicale-data:
  frontend-node-modules:
