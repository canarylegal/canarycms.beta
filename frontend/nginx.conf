# Canary production frontend: static SPA + reverse proxy for API, WebDAV, and ONLYOFFICE.
# Matches paths documented in vite.config.ts (Vite dev server). Keep /coauthoring here — otherwise
# those requests hit try_files → index.html and ONLYOFFICE print preview stays on "Loading…".

map $http_x_forwarded_proto $canary_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream backend_upstream {
    server backend:8000;
}

upstream onlyoffice_upstream {
    server onlyoffice:80;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 500m;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ^~ /api/ {
        proxy_pass http://backend_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $canary_forwarded_proto;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location ^~ /webdav {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $canary_forwarded_proto;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Document Server maps $the_prefix from this header (see OO ds-docservice.conf) for redirects and asset URLs.
    location ^~ /office-ds/ {
        proxy_pass http://onlyoffice_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $canary_forwarded_proto;
        proxy_set_header X-Forwarded-Prefix /office-ds;
        proxy_redirect http://onlyoffice/ $canary_forwarded_proto://$host/;
        proxy_redirect http://onlyoffice:80/ $canary_forwarded_proto://$host/;
        proxy_redirect https://onlyoffice/ $canary_forwarded_proto://$host/;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Docservice (Node) lives behind DS nginx at location / — CommandService, co-editing WS, etc.
    # Without this, /coauthoring/* falls through to try_files → SPA HTML and print preview stays on "Loading…".
    location ^~ /coauthoring {
        proxy_pass http://onlyoffice_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $canary_forwarded_proto;
        proxy_redirect http://onlyoffice/ $canary_forwarded_proto://$host/;
        proxy_redirect http://onlyoffice:80/ $canary_forwarded_proto://$host/;
        proxy_redirect https://onlyoffice/ $canary_forwarded_proto://$host/;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location ^~ /doc {
        proxy_pass http://onlyoffice_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
