# Development overrides: bind-mount backend source and enable uvicorn --reload.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml --profile dev up
#
# Combine with COMPOSE_PROFILES=dev in `.env` so you can omit --profile dev.

services:
  backend:
    command:
      [
        "sh",
        "-c",
        "alembic upgrade head && exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload",
      ]
    volumes:
      - ./backend:/app
